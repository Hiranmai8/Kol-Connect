{% extends "layout_dashboard.html" %}
{% block content %}
<div class="browse-kols">
<h2>Browse KOLs</h2>
<div class="search-row">
<input type="text" placeholder="Search KOLs..." class="search-box">
<select>
<option>All Platforms</option>
<option>Instagram</option>
<option>YouTube</option>
<option>TikTok</option>
</select>
<select>
<option>All Categories</option>
<option>Fashion</option>
<option>Tech</option>
<option>Fitness</option>
<option>Food</option>
</select>
</div>
<div class="kol-grid">
<!-- CARD -->
<div class="kol-card">
<div class="kol-header">
<div class="avatar">SC</div>
<div>
<h4>Sarah Chen</h4>
<p>Fashion • Instagram</p>
</div>
</div>
<div class="stats">
<div>
<strong>250K</strong>
<span>Followers</span>
</div>
<div>
<strong>4.2%</strong>
<span>Engage</span>
</div>
<div>
<strong>4.8</strong>
<span>Rating</span>
</div>
</div>
<p class="price">Est. $500-$2,000</p>
<div class="buttons">
<button class="profile-btn">Profile</button>
<button class="propose-btn">Propose</button>
</div>
</div>
<!-- CARD -->
<div class="kol-card">
<div class="kol-header">
<div class="avatar">AR</div>
<div>
<h4>Alex Rivera</h4>
<p>Tech • YouTube</p>
</div>
</div>
<div class="stats">
<div>
<strong>1.2M</strong>
<span>Followers</span>
</div>
<div>
<strong>3.8%</strong>
<span>Engage</span>
</div>
<div>
<strong>4.9</strong>
<span>Rating</span>
</div>
</div>
<p class="price">Est. $2,000-$5,000</p>
<div class="buttons">
<button class="profile-btn">Profile</button>
<button class="propose-btn">Propose</button>
</div>
</div>
</div>
</div>
{% endblock %}
