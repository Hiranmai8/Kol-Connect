<!DOCTYPE html>

<html>
<head>

<title>Forgot Password</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:350px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<p>Enter your email to reset your password</p>

<form method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Send Reset Link</button>

</form>

<a href="/login">Back to Login</a>

</div>

</body>
</html>
